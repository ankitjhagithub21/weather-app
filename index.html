<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container">
        <h1 class="text-success my-4">Weather App</h1>
        <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" id="city">
            <button class="btn btn-outline-success" type="submit" id="btn">Search</button>
        </form>
        <h2 class="text-success text-center my-4">Search For <span id="cityName"></span></h2>
        <hr>
        <div class="row row-cols-1 row-cols-md-3 mb-3 text-center">
            <div class="col">
                <div class="card mb-4 rounded-3 shadow-sm">
                    <div class="card-header py-3">
                        <h4 class="my-0 fw-normal">Temperature</h4>
                    </div>
                    <div class="card-body">
                        <h1 class="card-title pricing-card-title"><span id="temp1"></span>&#8451;</h1>
                        <ul class="list-unstyled mt-3 mb-4">
                            <li class="fs-5">Temperature is: <span id="temp"></span></li>
                            <li class="fs-5">Max Temperature is: <span id="max_temp"></span></li>
                            <li class="fs-5">Min Temperature is: <span id="min_temp"></span></li>

                        </ul>

                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card mb-4 rounded-3 shadow-sm">
                    <div class="card-header py-3">
                        <h4 class="my-0 fw-normal">Humidity</h4>
                    </div>
                    <div class="card-body">
                        <h1 class="card-title pricing-card-title"><span id="humidity1"></span>%</h1>
                        <ul class="list-unstyled mt-3 mb-4">
                            <li class="fs-5">Humidity: <span id="humidity"></span></li>
                            <li class="fs-5">Feels Like: <span id="feels_like"></span></li>
                            <li class="fs-5">Description: <span id="desc"></span></li>

                        </ul>

                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card mb-4 rounded-3 shadow-sm">
                    <div class="card-header py-3">
                        <h4 class="my-0 fw-normal">Wind Speed</h4>
                    </div>
                    <div class="card-body">
                        <h1 class="card-title pricing-card-title"> <span id="wind_speed1"></span>/ms</h1>
                        <ul class="list-unstyled mt-3 mb-4">
                            <li class="fs-5">Wind Speed is: <span id="wind_speed"></span></li>
                            <li class="fs-5">Sunrise: <span id="sunrise"></span></li>
                            <li class="fs-5">Sunset: <span id="sunset"></span></li>

                        </ul>

                    </div>
                </div>
            </div>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>

    <script src="app.js"></script>

</body>

</html>
